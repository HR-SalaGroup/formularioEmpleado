<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Sala Group - Formulario de Empleado</title>
    <style>
        :root {
            --primary: #4CAF50;
            --bg: #f4f7f6;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            color: #555;
            font-weight: 500;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        /* Mobile optimization */
        @media (max-width: 600px) {
            .loading-text { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Cargando Formulario La Sala Group...</div>
    </div>

    <!-- REEMPLAZAR EL 'src' CON TU URL DE APPS SCRIPT PUBLICADA -->
    <iframe 
        src="TU_URL_DE_APPS_SCRIPT_AQUI" 
        onload="hideLoading()"
        id="sheetIframe"
        allow="camera; microphone; geolocation"
    ></iframe>

    <script>
        function hideLoading() {
            const loader = document.getElementById('loading');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }

        // Si la carga tarda demasiado (ej. 10seg), mostrar mensaje de ayuda
        setTimeout(() => {
            const loader = document.getElementById('loading');
            if (loader.style.display !== 'none') {
                const text = loader.querySelector('.loading-text');
                text.innerHTML = 'Optimizando conexión...<br><small>Si el formulario no carga, <a href="TU_URL_DE_APPS_SCRIPT_AQUI" target="_blank">haz clic aquí</a></small>';
            }
        }, 10000);
    </script>
</body>
</html>
